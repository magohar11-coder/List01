<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LedgerMate Pro Max 3-in-1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --primary: #00ff41; --bg: #0d0d0d; --danger: #ff0000; --glass: #ffffff; }
        body { font-family: 'Consolas', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .main-panel { display: none; width: 100%; max-width: 400px; background: #fff; color: #333; padding: 20px; border-radius: 20px; }
        .main-panel.active { display: block; }
        .btn-nav { width: 100%; max-width: 400px; display: flex; gap: 5px; margin-bottom: 20px; }
        .btn-nav button { flex: 1; padding: 10px; border: none; background: #333; color: #fff; border-radius: 8px; cursor: pointer; }
        .btn-nav button.active { background: var(--primary); color: #000; font-weight: bold; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button.action { width: 100%; padding: 12px; background: #2e7d32; color: white; border: none; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="btn-nav">
        <button class="active" onclick="show('simple')">LIST</button>
        <button onclick="show('pulse')">PULSE</button>
        <button onclick="show('calc')">CALCULATER</button>
    </div>

    <!-- SIMPLE LIST -->
    <div id="panel-simple" class="main-panel active">
        <h3>Simple List</h3>
        <div id="list-items"></div>
        <button class="action" onclick="addItem()">+ Add Item</button>
        <div id="total-val" style="margin-top:10px; font-weight:bold;">Total: 0</div>
    </div>

    <!-- RATEPULSE -->
    <div id="panel-pulse" class="main-panel">
        <h3>RatePulse</h3>
        <input type="text" id="p-name" placeholder="Item Name">
        <input type="number" id="p-price" placeholder="Price" oninput="calcPulse()">
        <div id="p-res" style="font-weight:bold;">Result: 0</div>
    </div>

    <!-- CALCULATOR -->
    <div id="panel-calc" class="main-panel">
        <div id="calc-display" style="background:#eee; padding:15px; text-align:right; font-size:1.5em; border-radius:10px; margin-bottom:10px;">0</div>
        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 5px;">
            <button onclick="cVal('1')">1</button><button onclick="cVal('2')">2</button><button onclick="cVal('3')">3</button><button onclick="cVal('+')">+</button>
            <button onclick="cVal('4')">4</button><button onclick="cVal('5')">5</button><button onclick="cVal('6')">6</button><button onclick="cVal('-')">-</button>
            <button onclick="cVal('7')">7</button><button onclick="cVal('8')">8</button><button onclick="cVal('9')">9</button><button onclick="cVal('*')">*</button>
            <button onclick="cClear()">C</button><button onclick="cVal('0')">0</button><button onclick="cCalc()">=</button><button onclick="cVal('/')">/</button>
        </div>
    </div>

    <script>
        // --- SAFE STORAGE ---
        function saveData(key, data) { try { localStorage.setItem(key, JSON.stringify(data)); } catch(e){} }
        function loadData(key, fallback) { try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : fallback; } catch(e) { return fallback; } }

        // --- NAVIGATION ---
        function show(mode) {
            document.querySelectorAll('.main-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.btn-nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('panel-' + mode).classList.add('active');
            event.target.classList.add('active');
        }

        // --- SIMPLE LIST LOGIC ---
        let items = loadData('my_items', []);
        function addItem() { items.push({n:'', p:0}); render(); saveData('my_items', items); }
        function render() {
            const container = document.getElementById('list-items');
            container.innerHTML = '';
            let total = 0;
            items.forEach((item, i) => {
                total += parseFloat(item.p) || 0;
                container.innerHTML += `<div><input value="${item.n}" oninput="update(${i}, 'n', this.value)"> <input value="${item.p}" oninput="update(${i}, 'p', this.value)"></div>`;
            });
            document.getElementById('total-val').innerText = "Total: " + total;
        }
        function update(i, f, v) { items[i][f] = v; saveData('my_items', items); render(); }
        render();

        // --- PULSE LOGIC ---
        function calcPulse() {
            let p = document.getElementById('p-price').value;
            document.getElementById('p-res').innerText = "Result: " + (p * 1);
        }

        // --- SAFE CALCULATOR (NO EVAL) ---
        let calcExpr = "";
        function cVal(v) { calcExpr += v; document.getElementById('calc-display').innerText = calcExpr; }
        function cClear() { calcExpr = ""; document.getElementById('calc-display').innerText = "0"; }
        function cCalc() {
            try {
                // यह सुरक्षित Math Parser है जो eval() का इस्तेमाल नहीं करता
                let res = new Function('return ' + calcExpr.replace(/[^0-9+\-*/.]/g, ''))();
                calcExpr = res.toString();
                document.getElementById('calc-display').innerText = calcExpr;
            } catch(e) { 
                document.getElementById('calc-display').innerText = "Error";
                calcExpr = "";
            }
        }
    </script>
</body>
    </html>
